name: token-glace
arch: __ARCH__
platform: linux
version: __VERSION__
section: utils
priority: optional
maintainer: Vincent Koc <vincent@openclaw.ai>
description: |
  Lean output compaction for terminal-heavy agent workflows.
homepage: https://github.com/escoffier-labs/token-glace
license: MIT

depends:
  - nodejs

contents:
  - src: ./release/token-glace-v__VERSION__/dist
    dst: /usr/lib/token-glace/dist
  - src: ./release/token-glace-v__VERSION__/package.json
    dst: /usr/lib/token-glace/package.json
  - src: ./packaging/token-glace.sh
    dst: /usr/bin/token-glace
    file_info:
      mode: 0755
  - src: ./packaging/tokenjuice.sh
    dst: /usr/bin/tokenjuice
    file_info:
      mode: 0755
  - src: ./release/token-glace-v__VERSION__/README.md
    dst: /usr/share/doc/token-glace/README.md
  - src: ./release/token-glace-v__VERSION__/LICENSE
    dst: /usr/share/licenses/token-glace/LICENSE

deb:
  fields:
    Bugs: https://github.com/escoffier-labs/token-glace/issues

rpm:
  summary: Lean output compaction for terminal-heavy agent workflows
