name: Feature request
description: Suggest a new reducer, rule, host integration, or CLI improvement for tokenjuice.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve
      description: What noisy command, host, or workflow is wasting context or losing the lines that matter today?
      placeholder: |
        `docker build` output floods the context with layer-cache lines, and the one failing step gets buried.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What rule, reducer, host integration, or flag would address it, and roughly how should it behave?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example input and desired output
      description: A small before/after helps a lot. Redact anything sensitive; use 192.0.2.x for example IPs.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: upstream
    attributes:
      label: Scope
      options:
        - label: This is fork-specific (project metadata, fleet integration, or docs about this fork).
          required: false
        - label: This is general, and I understand it may be a better fit for upstream (vincentkoc/tokenjuice).
          required: false
